name: Windows Release Gate

on:
  workflow_dispatch:
    inputs:
      publish_prerelease:
        description: Create a draft development pre-release for unsigned artifacts.
        required: true
        type: boolean
        default: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: windows-release-gate-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: pwsh

jobs:
  unsigned_windows_release:
    name: Unsigned Windows release
    runs-on: windows-latest
    timeout-minutes: 75
    env:
      WAR_RELEASE_CHANNEL: development
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm.cmd ci
      - name: Build release bundle
        run: npm.cmd run release:bundle
      - name: Integrity gate
        run: npm.cmd run test:release:integrity
      - name: Packaged Controller gate
        run: npm.cmd run test:controller-electron:packaged
      - name: Release gate
        run: npm.cmd run test:release:gate
      - name: Static checks
        run: npm.cmd run check
      - name: Full tests
        run: npm.cmd run test:all
      - name: Audit
        run: npm.cmd audit
      - name: Upload sanitized release gate artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unsigned-windows-release-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: error
          include-hidden-files: false
          path: |
            dist/release/release-manifest.json
            dist/release/SHA256SUMS.txt
            dist/release/controller-electron/*.exe
            dist/release/controller-electron/win-unpacked/**
            dist/release/browser-agent/*.zip
            dist/release/extension/*.zip
            artifacts/release-packaging/*.json
            !dist/release/**/*.blockmap
            !dist/release/**/builder-debug.yml
            !dist/release/**/builder-effective-config.yaml
