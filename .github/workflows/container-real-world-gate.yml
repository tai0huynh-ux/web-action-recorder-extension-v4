name: Container Real World Gate

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: container-real-world-gate-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  controlled_search_copy:
    name: Controlled container search copy
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm ci
      - name: Build Browser Agent image
        run: npm run container:browser-agent:build
      - name: Load reviewed Chromium AppArmor profile
        run: |
          sudo install -d -o root -g root -m 0755 /etc/apparmor.d/containers
          sudo install -o root -g root -m 0644 platform/container/security/war-browser-agent.apparmor /etc/apparmor.d/containers/war-browser-agent
          sudo apparmor_parser -r -W /etc/apparmor.d/containers/war-browser-agent
      - name: Probe Chromium sandbox host capability
        run: npm run probe:chromium-sandbox-host
      - name: Run real-world container gate
        run: npm run test:container-real-world
      - name: Upload sanitized evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: container-real-world-gate-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: error
          include-hidden-files: false
          path: |
            artifacts/container-real-world/**
            !artifacts/container-real-world/**/*.log
      - name: Unload Chromium AppArmor profile
        if: always()
        run: |
          sudo apparmor_parser -R /etc/apparmor.d/containers/war-browser-agent || true
          sudo rm -f /etc/apparmor.d/containers/war-browser-agent
