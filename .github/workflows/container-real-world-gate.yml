name: Container Real World Gate

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: container-real-world-gate-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  controlled_search_copy:
    name: Controlled container search copy
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm ci
      - name: Build Browser Agent image
        run: npm run container:browser-agent:build
      - name: Run real-world container gate
        env:
          WAR_BROWSER_NO_SANDBOX: "1"
        run: npm run test:container-real-world
      - name: Upload sanitized evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: container-real-world-gate-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: error
          path: |
            artifacts/container-real-world/**
            !artifacts/container-real-world/**/*.log
